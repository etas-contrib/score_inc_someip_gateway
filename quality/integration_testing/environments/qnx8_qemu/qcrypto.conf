# Minimal qcrypto configuration for the random service.
# Uses the OpenSSL 3 plugin for cryptographic operations.
# The library auto-prepends "qcrypto-" to the plugin name,
# so "openssl-3" resolves to "qcrypto-openssl-3.so".
[random]
openssl-3 tags=random

# Workflow configuration for S-CORE CI - Bazel Build & Test module
# This workflow runs Bazel build and test when triggered by specific pull request events.

name: Build & Test module (with host toolchain)
on:
  workflow_call:
jobs:
  build_and_test_host:
    runs-on: ubuntu-24.04
    steps:
      - uses: eclipse-score/more-disk-space@v1
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Create Bazel output base directory
        run: |
          sudo mkdir -p /mnt/.bazel
          sudo chown -R $USER:$USER /mnt/.bazel
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          output-base: /mnt/.bazel
          # Avoid downloading Bazel every time.
          bazelisk-cache: true
          # Store build cache per workflow.
          disk-cache: ${{ github.workflow }}
          # Share repository cache between workflows.
          repository-cache: true
          # Cache external/
          external-cache: true
      - name: Allow linux-sandbox
        uses: ./.github/actions/unblock_user_namespace_for_linux_sandbox
      - run: df -h
      - name: Bazel build targets
        run: |
          bazel build //...
      - run: df -h
        if: always()
      - name: Bazel lint targets
        run: |
          bazel test --test_tag_filters=lint //...
      - name: Bazel test targets
        run: |
          bazel test //... --build_tests_only
      - name: Bazel TC8 SOME/IP Conformance Targets
        run: |
          # --config=tc8 creates a private network namespace per test (no sudo),
          # configures loopback multicast routing, and sets TC8_HOST_IP=127.0.0.1.
          bazel test --config=tc8 --test_output=all //tests/tc8_conformance/...
      - run: df -h
        if: always()
